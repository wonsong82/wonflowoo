# ============================================================================
# Choisor 2.0 Configuration Template (Operation Settings)
# ============================================================================
# Copy to .choisor/config.yaml and customize
#
# This file contains RUNTIME/OPERATIONAL settings only.
# Project properties (stages, task_sources, domain mappings) go in project.yaml.

# Assignment control
assignment:
  enabled: true   # true: 정상 할당, false: 새 작업 할당 중지
  delay: null     # minutes 할당 지연, 0 or null: 정상 할당
  stale_timeout: 10  # minutes: 비활성 세션 stale 판정 기준 (default: 10)

# Auto-commit settings
auto_commit:
  enabled: true
  commit_on_completion: true

# Limit Monitor control
limit_monitor:
  ignore_limit: true  # true: limit 감지 무시 (오탐 방지), false: 정상 감지

# Daemon configuration
daemon:
  refresh_interval: 10  # seconds (5-300)

# Provider settings
provider: "anthropic"
default_model: "claude-opus-4-5-20251101"

# Claude Code session configuration
claude_code:
  max_sessions: 1
  max_output_tokens: 65536
  default_model: "claude-opus-4-5-20251101"
  default_model_bedrock: "global.anthropic.claude-opus-4-5-20251101-v1:0"

# Current workflow position (runtime state)
current:
  stage: "stage1"
  phase: "phase1"

# Phase Gate settings (runtime control)
phase_gate:
  max_allowed_phase: "phase4"  # Maximum phase allowed for execution
  auto_to_max: true           # Auto-advance to max allowed phase

# Parallel execution settings
parallel:
  enabled: true
  pairs:
    - ["s4-03", "s4-04"]  # Code gen + test gen
  max_parallel_sessions: 10

# Path configurations (operational paths only)
# NOTE: Project-specific paths (source_base, specs_root) are in project.yaml
paths:
  skills_root: ".claude/skills"
  contracts_path: ".claude/skills/common/inter-stage-contracts.yaml"

# Work scope filtering (runtime filter)
work_scope:
  enabled_domains: null  # ["pa", "mm"] or null for all
  enabled_stages: null   # [1, 2, 3] or null for all

# Priority algorithm (runtime)
priority:
  algorithm: "weighted_score"  # "weighted_score" | "fifo"
  weights:
    dependency_ready: 0.5
    priority_score: 0.3
    estimated_duration: 0.2

# ============================================================================
# NOTE: The following are now in project.yaml (project properties):
# - stages: Stage definitions with skill mappings
# - task_sources: Task source locations
# - domain_priority_map: Domain groupings by priority tier
# - paths.source_base, paths.specs_root: Project directories
# ============================================================================
