# ============================================================================
# Hallain TFT Project Template (Project Properties)
# ============================================================================
# This template represents the default settings for the hallain_tft project.
# Copy to .choisor/project.yaml and customize for your project.

name: "hallain_tft"
description: "AI-based MES system migration project (iBatis → MyBatis)"

feature:
  id_prefix: "FEAT-"           # Feature ID prefix pattern
  gap_suffix: "GAP"            # Suffix for GAP features to skip
  skip_gap_features: true      # Skip GAP features in task generation

domain:
  skip_domains: []             # No domains skipped - all are migration targets
  priority_map:
    P0-Foundation: ["bw", "cm", "sd"]
    P1-Hub: ["eb", "sm"]
    P2-Core: ["ea", "mm", "pa", "pe", "sa", "sc"]
    P3-Supporting: ["bs", "qm"]

# Phase characteristics by stage
phase_types:
  stage1:
    phase1: "domain"    # s1-01: Feature Inventory (domain-level)
    phase2: "domain"    # s1-02: MiPlatform Protocol (domain-level)
    phase3: "feature"   # s1-03: Deep Analysis (per-feature)
    phase4: "feature"   # s1-04: Spec Generation (per-feature)
  stage2:
    phase1: "domain"    # s2-01: Source Inventory
    phase2: "domain"    # s2-02: Structural Comparison
    phase3: "feature"   # s2-03: Gap Analysis
    phase4: "feature"   # s2-04: Spec Completion
  stage3:
    phase1: "system"    # s3-01: Dependency Graph
    phase2: "system"    # s3-02: Interface Extraction
    phase3: "system"    # s3-03: Technical Debt
    phase4: "system"    # s3-04: Architecture Design
    phase5: "system"    # s3-05: Generation Spec
  stage4:
    phase1: "system"    # s4-01: Project Scaffold
    phase2: "system"    # s4-02: Mini-pilot
    phase3: "feature"   # s4-03: Domain Batch
    phase4: "feature"   # s4-04: Test Generation
    phase5: "system"    # s4-05: Integration Build
  stage5:
    phase1: "feature"   # s5-01: Structural Check
    phase2: "feature"   # s5-02: Functional Validation
    phase3: "feature"   # s5-03: API Contract Test
    phase4: "system"    # s5-04: Performance Baseline
    phase5: "system"    # s5-05: Quality Gate

paths:
  source_base: "hallain"                           # Legacy source directory
  target_base: "next-hallain"                      # Generated code directory
  java_src_path: "src/main/java"
  mapper_path: "src/main/resources/mapper"
  java_package: "com/halla"                        # Java package path
  specs_root: "work/specs"                         # Specifications root directory

# ============================================================================
# Stage Definitions (workflow structure)
# ============================================================================

stages:
  stage1:
    name: "Discovery"
    phases: ["phase1", "phase2", "phase3", "phase4"]
    skills:
      phase1: "s1-01-discovery-feature-inventory"
      phase2: "s1-02-discovery-miplatform-protocol"
      phase3: "s1-03-discovery-deep-analysis"
      phase4: "s1-04-discovery-spec-generation"

  stage2:
    name: "Validation"
    phases: ["phase1", "phase2", "phase3", "phase4"]
    skills:
      phase1: "s2-01-validation-source-inventory"
      phase2: "s2-02-validation-structural-comparison"
      phase3: "s2-03-validation-gap-analysis"
      phase4: "s2-04-validation-spec-completion"

  stage3:
    name: "Preparation"
    phases: ["phase1", "phase2", "phase3", "phase4", "phase5"]
    skills:
      phase1: "s3-01-preparation-dependency-graph"
      phase2: "s3-02-preparation-interface-extraction"
      phase3: "s3-03-preparation-technical-debt"
      phase4: "s3-04-preparation-architecture-design"
      phase5: "s3-05-preparation-generation-spec"

  stage4:
    name: "Generation"
    phases: ["phase1", "phase2", "phase3", "phase4", "phase5"]
    skills:
      phase1: "s4-01-generation-project-scaffold"
      phase2: "s4-02-generation-mini-pilot"
      phase3: "s4-03-generation-domain-batch"
      phase4: "s4-04-generation-test-generation"
      phase5: "s4-05-generation-integration-build"

  stage5:
    name: "Assurance"
    phases: ["phase1", "phase2", "phase3", "phase4", "phase5"]
    skills:
      phase1: "s5-01-assurance-structural-check"
      phase2: "s5-02-assurance-functional-validation"
      phase3: "s5-03-assurance-api-contract-test"
      phase4: "s5-04-assurance-performance-baseline"
      phase5: "s5-05-assurance-quality-gate"

# ============================================================================
# Task Sources (project-specific task locations)
# ============================================================================

task_sources:
  feature_inventory_base: "work/specs/stage1-outputs/phase1"
  feature_inventory_pattern: "work/specs/stage1-outputs/phase1/{priority}/{domain}/feature-inventory.yaml"
  stage1_specs: "work/specs/stage1-outputs/phase3"
  stage4_specs: "work/specs/stage1-outputs/phase3"
