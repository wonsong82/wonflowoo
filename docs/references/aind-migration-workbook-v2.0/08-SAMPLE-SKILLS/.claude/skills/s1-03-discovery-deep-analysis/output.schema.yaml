# Schema: summary.yaml (Deep Analysis Output)
# Skill: s1-03-discovery-deep-analysis
# Stage: 1 - Discovery
# Phase: 1.3 - Deep Analysis
# Version: 1.0.0

schema_info:
  name: "deep-analysis-summary"
  version: "1.0.0"
  skill_id: "s1-03-discovery-deep-analysis"
  output_file: "summary.yaml"
  output_path: "work/specs/stage1-outputs/phase3/{Priority}/{Domain}/FEAT-{DOMAIN}-{NNN}/"
  additional_outputs:
    - "api-endpoints/{feature_id}.yaml"
    - "business-logic/{feature_id}.yaml"
    - "data-access/{feature_id}.yaml"
    - "sql-mybatis/{feature_id}.yaml"
    - "data-model/{feature_id}.yaml"

# =============================================================================
# 최상위 구조 정의
# =============================================================================
root:
  required:
    - metadata
    - overview
    - layers
  optional:
    - dependencies
    - migration_notes
    - database

# =============================================================================
# metadata 섹션
# =============================================================================
metadata:
  description: "파일 메타데이터"
  required:
    - generated_by:
        type: string
        exact: "s1-03-discovery-deep-analysis"
    - generated_at:
        type: string
        $ref: "common-types.schema.yaml#/formats/iso8601_datetime"
    - domain:
        type: string
        $ref: "common-types.schema.yaml#/identifiers/domain_code"
    - feature_id:
        type: string
        $ref: "common-types.schema.yaml#/identifiers/feature_id"
    - screen_id:
        type: string
        $ref: "common-types.schema.yaml#/identifiers/screen_id"

# =============================================================================
# overview 섹션
# =============================================================================
overview:
  description: "Feature 분석 요약"
  required:
    - name:
        type: string
        description: "Feature 명칭"
    - complexity:
        type: string
        $ref: "common-types.schema.yaml#/severity_types/complexity"
    - endpoints_count:
        type: integer
        minimum: 1
    - services_count:
        type: integer
        minimum: 0
  optional:
    - description:
        type: string
    - daos_count:
        type: integer
    - vos_count:
        type: integer
    - sql_count:
        type: integer

# =============================================================================
# layers 섹션 (5-Layer 구조)
# =============================================================================
layers:
  description: "5-Layer 분석 결과"
  required:
    - l1_api_endpoints:
        type: object
        $ref: "#/layer_reference"
    - l2_business_logic:
        type: object
        $ref: "#/layer_reference"
    - l3_data_access:
        type: object
        $ref: "#/layer_reference"
    - l4_sql_mybatis:
        type: object
        $ref: "#/layer_reference"
    - l5_data_model:
        type: object
        $ref: "#/layer_reference"

layer_reference:
  description: "Layer 참조 구조"
  required:
    - file:
        type: string
        description: "Layer 상세 파일 경로"
  optional:
    - summary:
        type: object
        description: "Layer 요약 정보"

# =============================================================================
# dependencies 섹션
# =============================================================================
dependencies:
  description: "의존성 정보"
  optional:
    - internal:
        type: array
        description: "내부 의존성"
        item:
          required:
            - from:
                type: string
                $ref: "common-types.schema.yaml#/java_types/class_name"
            - to:
                type: string
                $ref: "common-types.schema.yaml#/java_types/class_name"
            - type:
                type: string
                enum: ["injection", "call", "extends", "implements"]
    - external:
        type: array
        description: "외부 도메인 의존성"
        item:
          required:
            - domain:
                type: string
                $ref: "common-types.schema.yaml#/identifiers/domain_code"
            - class:
                type: string
            - methods:
                type: array
                item:
                  type: string
          optional:
            - reason:
                type: string

# =============================================================================
# migration_notes 섹션
# =============================================================================
migration_notes:
  description: "마이그레이션 주의사항"
  type: array
  item:
    required:
      - type:
          type: string
          enum: ["WARNING", "INFO", "CRITICAL"]
      - layer:
          type: string
          $ref: "common-types.schema.yaml#/layer_types/layer_code"
      - description:
          type: string
    optional:
      - code:
          type: string
          description: "관련 코드 식별자"

# =============================================================================
# database 섹션
# =============================================================================
database:
  description: "데이터베이스 관련 정보"
  optional:
    - tables:
        type: array
        item:
          required:
            - name:
                type: string
                $ref: "common-types.schema.yaml#/database_types/table_name"
            - operations:
                type: array
                item:
                  type: string
                  $ref: "common-types.schema.yaml#/database_types/sql_operation"
          optional:
            - columns_used:
                type: array
                item:
                  type: string
    - stored_procedures:
        type: array
        item:
          type: string
    - dynamic_sql_patterns:
        type: array
        item:
          required:
            - type:
                type: string
            - count:
                type: integer

# =============================================================================
# 검증 규칙
# =============================================================================
validation_rules:
  structural:
    - rule_id: "V001"
      name: "required_keys"
      targets: ["metadata", "overview", "layers"]
      on_fail: "ERROR"
      blocking: true

    - rule_id: "V002"
      name: "five_layers_present"
      description: "5개 Layer 모두 존재"
      targets:
        - "layers.l1_api_endpoints"
        - "layers.l2_business_logic"
        - "layers.l3_data_access"
        - "layers.l4_sql_mybatis"
        - "layers.l5_data_model"
      on_fail: "ERROR"
      blocking: true

  content:
    - rule_id: "V003"
      name: "generated_by_exact"
      target: "metadata.generated_by"
      expected: "s1-03-discovery-deep-analysis"
      on_fail: "ERROR"
      blocking: true

    - rule_id: "V004"
      name: "feature_id_pattern"
      target: "metadata.feature_id"
      pattern: "^FEAT-[A-Z]{2,3}-\\d{3}$"
      on_fail: "ERROR"
      blocking: true

    - rule_id: "V005"
      name: "layer_file_exists"
      description: "각 Layer의 file 참조가 유효"
      targets:
        - "layers.l1_api_endpoints.file"
        - "layers.l2_business_logic.file"
        - "layers.l3_data_access.file"
        - "layers.l4_sql_mybatis.file"
        - "layers.l5_data_model.file"
      check: "file_exists"
      on_fail: "WARNING"
      blocking: false

    - rule_id: "V006"
      name: "external_domain_valid"
      target: "dependencies.external[].domain"
      $ref: "common-types.schema.yaml#/identifiers/domain_code"
      on_fail: "ERROR"
      blocking: true

# =============================================================================
# 예시
# =============================================================================
valid_example:
  metadata:
    generated_by: "s1-03-discovery-deep-analysis"
    generated_at: "2026-01-08T10:00:00Z"
    domain: "PA"
    feature_id: "FEAT-PA-001"
    screen_id: "PA01001"

  overview:
    name: "생산계획 조회"
    description: "생산계획 목록/상세 조회 및 저장 기능"
    complexity: "medium"
    endpoints_count: 3
    services_count: 1
    daos_count: 1
    vos_count: 2
    sql_count: 5

  layers:
    l1_api_endpoints:
      file: "api-endpoints/FEAT-PA-001.yaml"
      summary:
        total: 3
        by_method:
          POST: 3
    l2_business_logic:
      file: "business-logic/FEAT-PA-001.yaml"
      summary:
        services: 1
        transactional_methods: 1
    l3_data_access:
      file: "data-access/FEAT-PA-001.yaml"
      summary:
        daos: 1
        mapper_ids: 5
    l4_sql_mybatis:
      file: "sql-mybatis/FEAT-PA-001.yaml"
      summary:
        tables: ["TB_PROD_PLAN", "TB_PROD_PLAN_DTL"]
    l5_data_model:
      file: "data-model/FEAT-PA-001.yaml"
      summary:
        vo_classes: 2
        total_fields: 15

  dependencies:
    internal:
      - from: "PA01001Controller"
        to: "PA01001Service"
        type: "injection"
      - from: "PA01001Service"
        to: "PA01001DAO"
        type: "injection"
    external:
      - domain: "CM"
        class: "CommonService"
        methods: ["getCodeList"]
        reason: "공통코드 조회"

  migration_notes:
    - type: "WARNING"
      layer: "L4"
      description: "Oracle CONNECT BY 사용 - 재귀 쿼리 변환 필요"
    - type: "INFO"
      layer: "L2"
      description: "트랜잭션 경계 명확 - @Transactional 적용 가능"

  database:
    tables:
      - name: "TB_PROD_PLAN"
        operations: ["SELECT", "INSERT", "UPDATE", "DELETE"]
        columns_used: ["PLAN_ID", "SITE_CD", "YYYYMM"]
    stored_procedures: []
    dynamic_sql_patterns:
      - type: "isNotNull"
        count: 3
